name: AI Stock Scan

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          pip install yfinance pandas

      - name: Run scanner
        run: |
          python scan_oslo.py

      - name: Commit updated signals
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add signals.json
          git commit -m "update signals" || echo "no change"
          git push
