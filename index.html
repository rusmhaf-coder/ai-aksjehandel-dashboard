<!DOCTYPE html>
<html>
<head>
  <title>AI Aksjehandel Dashboard</title>
  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      padding:40px;
    }

    h1{
      font-size:32px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-top:20px;
    }

    .buy{color:#22c55e}
    .watch{color:#f59e0b}
    .sell{color:#ef4444}
  </style>
</head>

<body>

<h1>📈 AI Trading Dashboard</h1>

<div class="card">
<h2>KOG.OL</h2>
<p class="buy">Signal: BUY</p>
<p>Entry: 1284</p>
<p>Stop: 1228</p>
<p>Target: 1396</p>
</div>

<div class="card">
<h2>EQNR.OL</h2>
<p class="watch">Signal: WATCH</p>
<p>Entry: 281</p>
<p>Stop: 269</p>
<p>Target: 305</p>
</div>

<div class="card">
<h2>TSLA</h2>
<p class="sell">Signal: SELL</p>
<p>Entry: 182</p>
<p>Stop: 190</p>
<p>Target: 165</p>
</div>

</body>
</html>
