<!DOCTYPE html>
<html>
<head>
<title>AI Trading Dashboard</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.buy{color:#22c55e}
.watch{color:#f59e0b}
.sell{color:#ef4444}

</style>
</head>

<body>

<h1>📈 AI Trading Dashboard</h1>

<div id="signals"></div>

<script>

fetch('signals.json')
.then(res=>res.json())
.then(data=>{

let container = document.getElementById("signals")

data.forEach(stock=>{

let color = "watch"

if(stock.signal==="BUY") color="buy"
if(stock.signal==="SELL") color="sell"

container.innerHTML += `
<div class="card">

<h2>${stock.symbol}</h2>

<p class="${color}">
Signal: ${stock.signal}
</p>

<p>Entry: ${stock.entry}</p>
<p>Stop: ${stock.stop}</p>
<p>Target: ${stock.target}</p>

</div>
`

})

})

</script>

</body>
</html>
